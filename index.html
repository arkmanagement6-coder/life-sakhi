<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Optimization -->
    <title>Life Changing Educational & Charitable Trust | Life Sakhi Initiative</title>
    <meta name="description" content="Empowering rural lives across India through quality child education, medical camps, nutrition programs, and women-led sanitary pad distribution under the Life Sakhi brand." />
    <meta name="keywords" content="NGO, Charitable Trust, Women Livelihoods, Life Sakhi, Menstrual Hygiene, Subsidized Pads, Rural Healthcare, CSR funding, 80G tax exemption, India" />
    <meta name="author" content="Life Changing Educational & Charitable Trust" />

    <!-- Hide Google Translate Banner Styling -->
    <style>
      iframe.goog-te-banner-frame {
        display: none !important;
      }
      body {
        top: 0px !important;
      }
      .skiptranslate {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Root Container -->
    <div id="root"></div>

    <!-- Hidden Google Translate Element Target -->
    <div id="google_translate_element" style="display: none; visibility: hidden;"></div>

    <!-- Main Module script -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translation API Integration -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,bn,gu,mr,pa,ta,te,kn,ml,as,ur,or,sa',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
